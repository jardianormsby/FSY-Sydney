<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FSY Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-35:#005175;
    --blue-25:#007DA5;
    --blue-5:#C4E9F5;
    --yellow-15:#FCB449;
    --green-78:#8DBF67;
    --green-42:#BED7A7;
    --logistics:#7E93A3;
    --ink:#0A2F42;
    --paper:#F5FAFC;
    --card:#FFFFFF;
    --line:#E1EEF3;
    --shadow: 0 10px 30px -12px rgba(0,60,90,0.25);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background: linear-gradient(180deg,#DDEFF5 0%, #EAF4F7 40%, #F3F8F6 100%);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:0;
  }

  @media (min-width:560px){
    body{ padding:32px 16px; align-items:center; }
  }

  .app{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:var(--paper);
    position:relative;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  @media (min-width:560px){
    .app{
      min-height:844px;
      height:844px;
      border-radius:40px;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,0.6);
    }
  }

  /* ---------- Header ---------- */
  .header{
    position:relative;
    background:
      radial-gradient(120px 120px at 88% -10%, rgba(252,180,73,0.9), rgba(252,180,73,0) 70%),
      linear-gradient(160deg, var(--blue-25) 0%, var(--blue-35) 75%);
    padding:22px 22px 40px;
    color:#fff;
    flex-shrink:0;
    overflow:hidden;
  }
  .header::after{
    content:"";
    position:absolute;
    left:-10%;
    right:-10%;
    bottom:-2px;
    height:26px;
    background:var(--paper);
    border-radius:50% 50% 0 0 / 100% 100% 0 0;
  }
  .header-top{
    display:flex;
    align-items:center;
    gap:12px;
    position:relative;
    z-index:2;
  }
  .logo-mark{
    width:40px;
    height:40px;
    flex-shrink:0;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.25));
  }
  .logo-mark img{width:100%;height:100%;object-fit:contain;display:block;}
  .header-titles{ line-height:1.15; }
  .eyebrow{
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.75);
    font-weight:600;
    margin:0 0 2px;
  }
  .header-titles h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:23px;
    margin:0;
    letter-spacing:0.01em;
  }
  .dress-badge-row{
    padding:16px 18px 4px;
    flex-shrink:0;
  }
  .dress-badge{
    display:inline-flex;
    align-items:center;
    gap:7px;
    background:#fff;
    border:1.5px solid var(--blue-5);
    padding:6px 12px 6px 10px;
    border-radius:100px;
    font-size:12.5px;
    font-weight:700;
    color:var(--blue-35);
    box-shadow:0 3px 10px -5px rgba(0,81,117,0.25);
  }
  .dress-badge svg{width:14px;height:14px;flex-shrink:0; color:var(--blue-25);}
  .dress-badge .dress-label{
    color:#6b8794;
    font-weight:600;
    margin-right:1px;
  }

  /* ---------- Day selector ---------- */
  .day-scroll{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:14px 18px 12px;
    flex-shrink:0;
    scrollbar-width:none;
  }
  .day-scroll::-webkit-scrollbar{display:none;}
  .day-pill{
    flex-shrink:0;
    scroll-snap-align:start;
    border:1.5px solid var(--line);
    background:var(--card);
    color:var(--blue-35);
    border-radius:14px;
    padding:8px 6px;
    min-width:56px;
    text-align:center;
    cursor:pointer;
    transition:all .18s ease;
    user-select:none;
  }
  .day-pill .d-label{
    display:block;
    font-size:10px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    opacity:0.55;
  }
  .day-pill .d-num{
    display:block;
    font-family:'Fraunces',serif;
    font-size:18px;
    font-weight:600;
    margin-top:1px;
  }
  .day-pill.active{
    background:var(--blue-35);
    border-color:var(--blue-35);
    color:#fff;
    box-shadow:0 6px 14px -6px rgba(0,81,117,0.55);
  }
  .day-pill.active .d-label{opacity:0.8;}

  /* ---------- Category filter chips ---------- */
  .filters{
    display:flex;
    gap:8px;
    padding:0 18px 14px;
    flex-wrap:wrap;
    flex-shrink:0;
  }
  .chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11.5px;
    font-weight:600;
    padding:5px 10px 5px 8px;
    border-radius:100px;
    background:var(--card);
    border:1.3px solid var(--line);
    color:var(--ink);
    opacity:0.55;
    cursor:pointer;
    transition:all .15s ease;
    user-select:none;
  }
  .chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .chip.active{opacity:1; border-color:currentColor; }

  /* ---------- Role filter chips (row 2) ---------- */
  .filters-roles{
    display:flex;
    gap:6px;
    padding:0 18px 16px;
    flex-wrap:nowrap;
    flex-shrink:0;
    margin-top:-4px;
  }
  .role-chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    font-size:11px;
    font-weight:600;
    padding:5px 8px;
    border-radius:8px;
    background:var(--card);
    border:1.3px dashed var(--line);
    color:var(--ink);
    opacity:0.55;
    cursor:pointer;
    transition:all .15s ease;
    user-select:none;
    flex:1 1 0;
    min-width:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .role-chip .sq{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
  .role-chip.active{
    opacity:1;
    color:#fff;
    border-style:solid;
    border-color:transparent;
  }
  .role-chip.active .sq{background:#fff !important;}

  .role-hint{
    padding:0 18px 14px;
    margin-top:-6px;
  }
  .role-hint span{
    font-size:11.5px;
    color:#6b8794;
    font-style:italic;
  }

  /* ---------- Timeline ---------- */
  .content{
    flex:1;
    overflow-y:auto;
    padding:4px 18px 24px;
    position:relative;
  }
  .day-meta{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding:6px 2px 14px;
  }
  .day-meta h2{
    font-family:'Fraunces',serif;
    font-size:20px;
    font-weight:600;
    margin:0;
    color:var(--blue-35);
  }
  .day-meta span{
    font-size:12px;
    color:var(--blue-25);
    font-weight:600;
  }

  .timeline{
    position:relative;
    padding-left:6px;
  }
  .timeline::before{
    content:"";
    position:absolute;
    left:20px;
    top:6px;
    bottom:6px;
    width:2px;
    background:linear-gradient(180deg, var(--blue-25), var(--green-78) 45%, var(--yellow-15) 100%);
    opacity:0.35;
    border-radius:2px;
  }

  .event{
    position:relative;
    display:flex;
    gap:14px;
    padding:0 0 20px 0;
    opacity:0;
    transform:translateY(6px);
    animation:rise .38s ease forwards;
  }
  @keyframes rise{ to{opacity:1; transform:translateY(0);} }

  .event-dot{
    flex-shrink:0;
    width:41px;
    height:41px;
    border-radius:50%;
    background:var(--card);
    border:2px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    z-index:1;
    box-shadow:0 3px 8px -3px rgba(10,47,66,0.18);
  }
  .event-dot svg{width:18px;height:18px;}

  .event-body{
    flex:1;
    min-width:0;
    padding-top:2px;
  }
  .event-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:8px;
  }
  .event-head-text{ min-width:0; flex:1; }
  .event-time{
    font-size:11.5px;
    font-weight:700;
    letter-spacing:0.02em;
    color:var(--blue-25);
    margin-bottom:3px;
  }
  .event-title{
    font-size:15px;
    font-weight:600;
    color:var(--ink);
    line-height:1.35;
  }
  .event-tag{
    display:inline-block;
    margin-top:6px;
    font-size:10px;
    font-weight:700;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:2px 8px;
    border-radius:100px;
  }

  .event.hidden{ display:none; }

  /* expandable role-instruction state */
  .event.expandable .event-head{ cursor:pointer; }
  .event.role-inactive{ opacity:0.4; }

  .chevron{
    flex-shrink:0;
    width:20px;
    height:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:3px;
    color:#9AB0BB;
    transition:transform .22s ease;
  }
  .event.open .chevron{ transform:rotate(180deg); color:var(--blue-35); }
  .chevron svg{width:14px;height:14px;}

  .event-instruction{
    max-height:0;
    overflow:hidden;
    transition:max-height .28s ease, opacity .22s ease, margin-top .22s ease;
    opacity:0;
  }
  .event.open .event-instruction{
    max-height:260px;
    opacity:1;
    margin-top:8px;
  }
  .event-instruction-inner{
    font-size:12px;
    font-weight:500;
    line-height:1.5;
    color:#4E6B78;
    background:#F1F7F9;
    border-left:2.5px solid var(--role-color, var(--blue-25));
    padding:8px 10px;
    border-radius:0 8px 8px 0;
  }
  .event-instruction-inner b{
    color:var(--role-color, var(--blue-35));
    font-weight:700;
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--blue-35);
    opacity:0.55;
  }
  .empty-state svg{width:40px;height:40px;margin-bottom:10px;opacity:0.7;}
  .empty-state p{font-size:13px;font-weight:500;margin:0;}

  /* ---------- Top nav ---------- */
  .top-nav{
    position:relative;
    background:transparent;
    display:flex;
    flex-shrink:0;
    padding:8px 8px;
    z-index:20;
  }
  .nav-btn{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    background:none;
    border:none;
    color:#9AB0BB;
    font-family:'Inter',sans-serif;
    font-size:10.5px;
    font-weight:600;
    padding:6px 2px;
    cursor:pointer;
    border-radius:12px;
    transition:color .15s ease;
  }
  .nav-btn svg{width:22px;height:22px;}
  .nav-btn.active{ color:var(--blue-35); }
  .nav-btn.active svg{ filter:drop-shadow(0 2px 4px rgba(0,81,117,0.25)); }

  /* ---------- Placeholder screens ---------- */
  .placeholder{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 32px;
    gap:14px;
  }
  .placeholder .ph-icon{
    width:64px;height:64px;
    border-radius:20px;
    background:linear-gradient(160deg,var(--blue-5),#fff);
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow);
  }
  .placeholder .ph-icon svg{width:30px;height:30px;color:var(--blue-25);}
  .placeholder h2{
    font-family:'Fraunces',serif;
    font-size:20px;
    color:var(--blue-35);
    margin:0;
  }
  .placeholder p{
    font-size:13px;
    color:#5b7c8a;
    margin:0;
    max-width:240px;
    line-height:1.5;
  }

  .screen{ display:none; flex-direction:column; flex:1; min-height:0; }
  .screen.active{ display:flex; }

  /* ================= HEAD COUNT SCREEN ================= */

  /* ---- Time-of-day pills (which head count session) ---- */
  .hc-time-row{
    display:flex;
    gap:6px;
    padding:0 18px 12px;
    flex-shrink:0;
  }
  .hc-time-pill{
    flex-shrink:0;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    font-weight:700;
    padding:7px 13px;
    border-radius:100px;
    background:var(--card);
    border:1.3px solid var(--line);
    color:var(--blue-35);
    opacity:0.6;
    cursor:pointer;
    user-select:none;
    transition:all .15s ease;
  }
  .hc-time-pill svg{width:13px;height:13px;flex-shrink:0;}
  .hc-time-pill.active{
    opacity:1;
    background:var(--blue-35);
    border-color:var(--blue-35);
    color:#fff;
    box-shadow:0 6px 14px -6px rgba(0,81,117,0.5);
  }
  .hc-time-pill .hc-tick{
    width:14px;height:14px;border-radius:50%;
    background:var(--green-78);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .hc-time-pill .hc-tick svg{width:9px;height:9px;color:#fff;}
  .hc-none-today{
    padding:0 18px 4px;
  }
  .hc-none-today span{
    font-size:12px;
    color:#6b8794;
    font-style:italic;
  }

  /* ---- Company tab scroller (mirrors the category chips, but horizontally scrollable & single-select) ---- */
  .company-scroll{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:0 18px 14px;
    flex-shrink:0;
    flex-wrap:nowrap;
    scrollbar-width:none;
  }
  .company-scroll::-webkit-scrollbar{display:none;}
  .company-chip{
    position:relative;
    flex-shrink:0;
    scroll-snap-align:start;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12.5px;
    font-weight:700;
    padding:8px 14px;
    border-radius:100px;
    background:var(--card);
    border:1.5px solid var(--line);
    color:var(--blue-35);
    opacity:0.62;
    cursor:pointer;
    user-select:none;
    transition:all .15s ease;
    white-space:nowrap;
  }
  .company-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--blue-25);flex-shrink:0;}
  .company-chip.active{
    opacity:1;
    background:var(--blue-35);
    border-color:var(--blue-35);
    color:#fff;
    box-shadow:0 6px 14px -6px rgba(0,81,117,0.5);
  }
  .company-chip.active .dot{background:#fff;}
  .company-chip .chip-check{
    width:15px;height:15px;
    border-radius:50%;
    background:var(--green-78);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    margin-left:-2px;
  }
  .company-chip .chip-check svg{width:9px;height:9px;color:#fff;}

  .hc-content{
    flex:1;
    overflow-y:auto;
    padding:4px 18px 24px;
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  /* ---- Counselors strip ---- */
  .counselor-block{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:12px 14px;
    margin-bottom:14px;
    flex-shrink:0;
  }
  .counselor-block h3{
    margin:0 0 8px;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#6b8794;
  }
  .counselor-list{
    display:flex;
    flex-wrap:wrap;
    gap:7px;
  }
  .counselor-tag{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    font-weight:600;
    color:var(--ink);
    background:#F1F7F9;
    border-radius:100px;
    padding:4px 10px 4px 4px;
  }
  .counselor-tag .cav{
    width:20px;height:20px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:8.5px;
    font-weight:800;
    color:#fff;
    flex-shrink:0;
  }

  /* ---- Progress bar ---- */
  .hc-progress-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
    flex-shrink:0;
  }
  .hc-progress-label{
    font-size:12.5px;
    font-weight:700;
    color:var(--blue-35);
  }
  .hc-progress-sub{
    font-size:11px;
    color:#6b8794;
    font-weight:600;
  }
  .hc-progress-track{
    height:7px;
    border-radius:100px;
    background:#E1EEF3;
    overflow:hidden;
    flex-shrink:0;
    margin-bottom:16px;
  }
  .hc-progress-fill{
    height:100%;
    border-radius:100px;
    background:linear-gradient(90deg, var(--blue-25), var(--green-78));
    transition:width .3s ease;
  }

  /* ---- Swipe card stack ---- */
  .swipe-stage{
    position:relative;
    flex:1;
    min-height:300px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:4px 0 10px;
  }
  .swipe-card{
    position:absolute;
    inset:0;
    margin:auto;
    width:100%;
    max-width:280px;
    height:fit-content;
    background:var(--card);
    border-radius:26px;
    box-shadow:var(--shadow);
    border:1px solid rgba(255,255,255,0.7);
    padding:34px 20px 26px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    touch-action:none;
    cursor:grab;
    user-select:none;
  }
  .swipe-card.behind{
    z-index:1;
    transform:scale(0.93) translateY(14px);
    opacity:0.6;
    pointer-events:none;
  }
  .swipe-card.top{ z-index:2; }
  .swipe-card.flying-right{ transition:transform .32s ease, opacity .32s ease; transform:translate(420px,-30px) rotate(24deg) !important; opacity:0; }
  .swipe-card.flying-left{ transition:transform .32s ease, opacity .32s ease; transform:translate(-420px,-30px) rotate(-24deg) !important; opacity:0; }
  .swipe-card.snap-back{ transition:transform .28s cubic-bezier(.2,.9,.3,1.3); }

  .card-avatar{
    width:112px;height:112px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;
    font-size:34px;
    font-weight:600;
    color:#fff;
    margin-bottom:16px;
    box-shadow:0 8px 18px -8px rgba(10,47,66,0.35);
    flex-shrink:0;
  }
  .card-name{
    font-family:'Fraunces',serif;
    font-size:21px;
    font-weight:600;
    color:var(--ink);
    margin:0 0 4px;
  }
  .card-gender{
    font-size:11px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:#6b8794;
  }
  .card-stamp{
    position:absolute;
    top:26px;
    padding:6px 14px;
    border-radius:8px;
    font-size:14px;
    font-weight:800;
    letter-spacing:0.06em;
    text-transform:uppercase;
    border:3px solid;
    opacity:0;
    transform:rotate(-14deg);
  }
  .card-stamp.stamp-here{ right:18px; color:var(--green-78); border-color:var(--green-78); transform:rotate(12deg); }
  .card-stamp.stamp-nope{ left:18px; color:#C8553B; border-color:#C8553B; transform:rotate(-12deg); }

  .swipe-actions{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:26px;
    padding:6px 0 4px;
    flex-shrink:0;
  }
  .swipe-btn{
    width:56px;height:56px;
    border-radius:50%;
    border:none;
    background:var(--card);
    box-shadow:0 8px 18px -8px rgba(10,47,66,0.3);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:transform .12s ease;
  }
  .swipe-btn:active{ transform:scale(0.9); }
  .swipe-btn svg{width:24px;height:24px;}
  .swipe-btn.absent{ color:#C8553B; }
  .swipe-btn.present{ color:var(--green-78); }
  .swipe-hint{
    text-align:center;
    font-size:11.5px;
    color:#6b8794;
    font-weight:600;
    margin-top:10px;
    flex-shrink:0;
  }

  /* ---- Submit / complete states ---- */
  .hc-complete{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    gap:12px;
    padding:20px;
  }
  .hc-complete .big-tick{
    width:84px;height:84px;
    border-radius:50%;
    background:var(--green-78);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 24px -10px rgba(141,191,103,0.7);
  }
  .hc-complete .big-tick svg{width:40px;height:40px;color:#fff;}
  .hc-complete h3{
    font-family:'Fraunces',serif;
    font-size:20px;
    color:var(--blue-35);
    margin:0;
  }
  .hc-complete p{
    font-size:13px;
    color:#5b7c8a;
    margin:0;
    max-width:240px;
    line-height:1.5;
  }
  .hc-submit-btn{
    margin-top:6px;
    background:var(--blue-35);
    color:#fff;
    border:none;
    padding:14px 30px;
    border-radius:100px;
    font-size:14.5px;
    font-weight:700;
    font-family:'Inter',sans-serif;
    cursor:pointer;
    box-shadow:0 10px 20px -8px rgba(0,81,117,0.5);
  }
  .hc-reset-link{
    background:none; border:none;
    font-size:11px;
    color:#9AB0BB;
    text-decoration:underline;
    cursor:pointer;
    margin-top:14px;
    font-family:'Inter',sans-serif;
  }

  /* ---- All-companies dashboard ---- */
  .hc-dash-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding-bottom:10px;
  }
  .hc-dash-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px;
    cursor:pointer;
    transition:transform .12s ease;
    position:relative;
  }
  .hc-dash-card:active{ transform:scale(0.97); }
  .hc-dash-card .dc-title{
    font-family:'Fraunces',serif;
    font-size:15px;
    font-weight:600;
    color:var(--blue-35);
    margin-bottom:8px;
  }
  .hc-dash-card .dc-status{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:11.5px;
    font-weight:700;
  }
  .hc-dash-card .dc-status.done{ color:var(--green-78); }
  .hc-dash-card .dc-status.progress{ color:var(--yellow-15); }
  .hc-dash-card .dc-status.pending{ color:#9AB0BB; }
  .hc-dash-card .dc-tick{
    width:18px;height:18px;
    border-radius:50%;
    background:var(--green-78);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .hc-dash-card .dc-tick svg{width:10px;height:10px;color:#fff;}
  .hc-dash-summary{
    padding:2px 2px 14px;
    flex-shrink:0;
  }
  .hc-dash-summary h2{
    font-family:'Fraunces',serif;
    font-size:20px;
    font-weight:600;
    margin:0 0 3px;
    color:var(--blue-35);
  }
  .hc-dash-summary span{
    font-size:12px;
    color:var(--blue-25);
    font-weight:600;
  }
</style>
</head>

      ["1:15 – 1:30 PM","Room Checks (if applicable)","logistics",
        r("Check rooms for pre-existing damage, report anything urgent to your assistant coordinator right away, and have youth report any new damage immediately.",
          "Collect damage information from each of your counselors before Meet Your Counselor. Follow up with anyone who hasn't reported by the time orientation starts, and flag anything that would hurt a participant's experience — like a broken toilet, shower, key, or window — to the assistant coordinator on damage report duty. If that's you, compile all reports by the evening of Day One and notify the coordinators right away so the facility contact can fix it quickly.",
          "Immediately notify the facility contact of any significant damage, such as a broken toilet, shower, key, or window.")],
      ["1:30 – 2:20 PM","Meet Your Counselor","activity",
        r("Your first meeting with your youth — introduce yourselves, set expectations, and walk through the \"Meet Your Counselor\" checklist in their handbook, having them sign once they understand.",
          "Quickly walk the check-in area to make sure every youth has found their counselor. Help with late check-ins and cleanup of check-in materials, and — under the coordinators' direction — call any no-shows to see if they're still coming, then let the affected counselors know.",
          null,
          "You're welcome to participate in Meet Your Counselor and Meet Your Company — introduce yourself and get to know the youth, but recognize this is the counselors' first opportunity to build a connection, and they have a lot of material to cover in a short time.")],
      ["2:30 – 3:05 PM","Meet Your Company","activity",
        r("Build unity as your company meets each other through icebreaker games, then read your company scripture together and explain your company name.",

          null,
          "You're welcome to participate — introduce yourself and get to know the youth, but let the counselors take the lead since this is their first real chance to connect.")],
      ["3:05 – 3:15 PM","Company Name & Chant","activity",

          "Be available to help coordinators and counselors as needed.")],
      ["3:30 – 4:30 PM","Orientation","activity",
        r("Stay on your feet and dancing to build excitement until the coordinators start; sit on an aisle in case youth need the restroom, and cheer enthusiastically to set the tone.",

          "One of your biggest opportunities to interact with and influence the youth — make sure the logistics are in place. Meet the audiovisual staff at least an hour early and run through the agenda, have assistant coordinators begin seating 10–15 minutes early, and have a backup plan ready (relative finder, sound of a smile, a scavenger hunt) in case technology fails.",
          "Arrive 30 minutes early to go over orientation procedures with the coordinators. You'll have two moments to participate: a 30-second introduction of yourself and your spouse, and introducing \"Conduct at Church Activities\" — aim to keep the upbeat energy of orientation while still giving these topics the seriousness they deserve.")],
      ["4:45 – 5:15 PM","Coordinator/Assistant Coordinator Meeting","logistics",
        r(null, "Come ready to report on your duties for the week and request help from other assistant coordinators for your assigned activities. Take notes and pass session-specific items along to your counselors (and have them pass it to participants).",

      ["4:45 – 5:45 PM","Dinner","meal", r("Eat with your company to build unity, set a good example, and leave the dining area clean.", null, "Attend", "Attend")],
      ["5:45 PM","Head Count","logistics",
        r("Take head count at your company spot and report to your assistant coordinator.",
          "Make sure all your counselors have reported head count.",
          "Each night, assistant coordinators under your supervision report participant head count to you — this is imperative so all youth are accounted for. If it's taking too long, politely offer help, and contact the session directing couple immediately if a youth is missing.")],
      ["6:00 – 6:45 PM","Home Evening Lesson","spiritual",
        r("Arrive early; have youth get out scriptures, handbook, and a pen before the opening prayer. Stay standing until it starts and take notes for Reflect and Review.", null,
          "Conduct this meeting. Be early and start on time, and sit on the stage with the session directing couple.",
          "The 45 minutes allotted should focus on the youth theme for the year — close by 6:45 p.m., since home evening activities immediately follow.")],
      ["7:00 – 8:00 PM","Home Evening Games","activity",
        r("Play a game or two from the FSY list (Caterpillar Race, Animal Sounds, Bandage Tag, Poison Stump, etc.), then spend 5–10 minutes debriefing to connect it to gospel principles.",
          "Observe your companies during the games and debriefing, and give help as needed — a good chance to bond with your counselors' youth by joining in. Coordinators may delegate other home evening needs to you as they come up.",
          null,
          "Meet the youth and participate with them during home evening activities.")],
      ["8:00 – 8:45 PM","Home Evening Goal Setting","spiritual",
        r("Guide your company through \"A Pattern for Growth\" — discover, plan, act, reflect, celebrate — to set company and personal goals for the week.",
          "Observe your counselors teaching this session.",
          "Observe counselors teaching, if desired.",
          "Attend a company goal-setting lesson.")],
      ["9:00 PM","Head Count","logistics",
        r("Take nightly head count and report to your assistant coordinator; remind youth to prep for bed and cover windows if applicable.",
          "Each night, make sure your counselors report head count in a timely, accurate way — meaning every youth is accounted for, in their sleeping quarters, with blinds closed if applicable, and not allowed to leave after head count. Report head count to the coordinators before you attend a counselor's Reflect and Review.",
          "Each night, assistant coordinators under your supervision report participant head count to you — this is imperative so all youth are accounted for. If it's taking too long, politely offer help, and contact the session directing couple immediately if a youth is missing.")],
      ["9:00 – 9:45 PM","Quiet Time","logistics",
        r("Let youth relax and get ready for bed. Stay nearby to monitor rooms rather than showering or making calls yourself.", null)],
      ["9:45 – 10:15 PM","Reflect & Review","spiritual",
        r("Guide youth to reflect on the day, share experiences, and record a \"Taking It Home\" action. Stay in FSY attire and let the Spirit lead the discussion.",
          "Observe a counselor teaching and facilitating. If possible, meet with them afterward to share positive feedback and constructive ways to improve.",
          "Observe a Reflect and Review, if desired.",
          "Attend a Reflect and Review — you're always welcome to participate, but remember this is the counselor's time to teach and lead, with plenty of room for the youth to participate.")],
      ["10:30 PM","Lights Out","logistics",
        r("Lights out at 10:30 — patrol near your youth's sleeping quarters for 15 minutes after the last light goes off.",
          "Be kind but firm. Patrol outside the sleeping quarters, and when you spot lights still on, find that youth's counselor and have them take care of it. Stay in communication with your counselors from 10:30 until every light is out, then text your coordinators once your whole group is dark. Nightly meetings shouldn't start until all lights are out, except in extreme circumstances at the coordinator's discretion.",
          "Encourage assistant coordinators to enforce lights out by speaking with the counselors rather than directly to the youth. Each night you should receive a text from every assistant coordinator once all youth lights are out; nightly meetings shouldn't begin until then, except in extreme circumstances at your discretion.")],
      ["10:30 PM","Coordinator/Assistant Coordinator Meeting","logistics",
        r(null, "This nightly meeting is a chance for the team to come together for brief counsel, clarification, and prayer.",
          "Hold this brief nightly meeting (10–15 minutes) once all lights are out, with all assistant coordinators present if possible. Cover team building, counselors' performance, announcements, a review of the day, and a preview of tomorrow, then close in prayer.",
          "This meeting is a brief overview of the day's activities and a look ahead to tomorrow — your presence builds team unity and can be of great value to everyone.")]

function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hashStr(s){
  let h = 0;
  for(let i=0;i<s.length;i++){ h = (h<<5) - h + s.charCodeAt(i); h |= 0; }
  return h;
}
function shuffled(arr, rng){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(rng()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function pick(pool, n, rng){ return shuffled(pool, rng).slice(0, n); }
function initialsOf(name){ return name.split(' ').map(w=>w[0]).join('').toUpperCase(); }
function avatarColor(name, gender){
  const pal = gender === 'F' ? AVATAR_PALETTE_F : AVATAR_PALETTE_M;
  return pal[Math.abs(hashStr(name)) % pal.length];
}

// Build 15 companies, each with 8 made-up counselors (4 male / 4 female)
// and a roster of 20 youth (10 male / 10 female).
const COMPANIES = [];
for(let c=1; c<=15; c++){
  const rng = mulberry32(4200 + c*97);
  const lastPool = pick(LAST_NAMES, 28, rng);
  let li = 0;

  const counselors = [
    ...pick(MALE_FIRST, 4, rng).map(fn => ({ name: `${fn} ${lastPool[li++]}`, gender:'M' })),
    ...pick(FEMALE_FIRST, 4, rng).map(fn => ({ name: `${fn} ${lastPool[li++]}`, gender:'F' }))
  ];

  const youth = [
    ...pick(MALE_FIRST, 10, rng).map((fn,i) => ({ id:`c${c}-m${i}`, name:`${fn} ${lastPool[li++]}`, gender:'M' })),
    ...pick(FEMALE_FIRST, 10, rng).map((fn,i) => ({ id:`c${c}-f${i}`, name:`${fn} ${lastPool[li++]}`, gender:'F' }))
  ].map(y => ({ ...y, initials: initialsOf(y.name) }));

  COMPANIES.push({ id:c, counselors, youth });
}

let hcActiveDay = "d1";
let hcActiveTimeIdx = 0;
let hcActiveCompany = "all";   // "all" or a company id (1-15)
let hcSessions = {};           // key -> { queue:[ids], confirmed:Set, submitted:bool, total:n }

function hcSessionKey(companyId, dayId, time){ return `${companyId}|${dayId}|${time}`; }

function hcCurrentTime(){
  const times = HEADCOUNT_TIMES[hcActiveDay] || [];
  return times[hcActiveTimeIdx] || null;
}

function hcGetSession(companyId){
  const time = hcCurrentTime();
  if(!time) return null;
  const key = hcSessionKey(companyId, hcActiveDay, time);
  if(!hcSessions[key]){
    const company = COMPANIES.find(c => c.id === companyId);
    const rng = mulberry32(Math.abs(hashStr(key)));
    const order = shuffled(company.youth.map(y => y.id), rng);
    hcSessions[key] = { queue: order, confirmed: new Set(), submitted:false, total: order.length };
  }
  return hcSessions[key];
}

function renderFilters(){
  filtersEl.innerHTML = Object.entries(CATS).map(([key,c])=>`

  `).join('');
  filtersEl.querySelectorAll('.chip').forEach(el=>{
    el.addEventListener('click', ()=>{
      const cat = el.dataset.cat;
      if(activeFilters.has(cat)){
        if(activeFilters.size>1) activeFilters.delete(cat);
      } else {
        activeFilters.add(cat);
      }
      renderFilters();
      renderTimeline();
    });
  });
}

function renderRoleFilters(){
  roleFiltersEl.innerHTML = Object.entries(ROLES).map(([key,rl])=>`

         style="${activeRole===key ? `background:${rl.color};` : `color:${rl.color};`}">

    </div>
  `).join('');
  roleFiltersEl.querySelectorAll('.role-chip').forEach(el=>{

      activeRole = (activeRole === role) ? null : role; // single-select, tap again to clear
      openEvents.clear();
      renderRoleFilters();
      renderTimeline();

}

function renderTimeline(){
  const day = DAYS.find(d=>d.id===activeDay);
  dayTitleEl.textContent = day.title;
  dressText.textContent = day.dress;

  const visible = day.events.filter(e => activeFilters.has(e[2]));
  dayCountEl.textContent = `${visible.length} event${visible.length!==1?'s':''}`;

  if(visible.length===0){
    timelineEl.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18"/></svg>
        <p>No events match your filters for this day.</p>
      </div>`;
    return;
  }

  timelineEl.innerHTML = visible.map(([time,title,cat,roles],i) => {
    const c = CATS[cat];
    const roleInfo = activeRole ? ROLES[activeRole] : null;
    const instruction = activeRole ? roles[activeRole] : null;
    const isExpandable = !!(activeRole && instruction);
    const isRoleTracked = !!activeRole;
    const isOpen = openEvents.has(i);

    const stateClasses = [
      isExpandable ? 'expandable' : '',
      isOpen && isExpandable ? 'open' : '',
      (isRoleTracked && !isExpandable) ? 'role-inactive' : ''
    ].filter(Boolean).join(' ');

    return `
      <div class="event ${stateClasses}" data-idx="${i}" style="animation-delay:${Math.min(i*0.035,0.4)}s; ${roleInfo?`--role-color:${roleInfo.color};`:''}">
        <div class="event-dot" style="border-color:${c.color}44;">
          <svg viewBox="0 0 24 24" fill="none" stroke="${c.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${c.icon}</svg>
        </div>
        <div class="event-body">
          <div class="event-head">
            <div class="event-head-text">
              <div class="event-time">${time}</div>
              <div class="event-title">${title}</div>
              <span class="event-tag" style="background:${c.color}1F; color:${c.color}">${c.label}</span>
            </div>
            ${isExpandable ? `<div class="chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div>` : ''}
          </div>
          ${isExpandable ? `
          <div class="event-instruction">
            <div class="event-instruction-inner"><b>${roleInfo.label}:</b> ${instruction}</div>
          </div>` : ''}
        </div>
      </div>`;
  }).join('');

  timelineEl.querySelectorAll('.event.expandable').forEach(el=>{
    el.querySelector('.event-head').addEventListener('click', ()=>{
      const idx = Number(el.dataset.idx);
      if(openEvents.has(idx)){ openEvents.delete(idx); } else { openEvents.add(idx); }
      renderTimeline();
    });
  });
}

    return;
  }
  hcNoneToday.style.display = 'none';
  hcTimeRow.style.display = 'flex';
  hcTimeRow.innerHTML = times.map((t,i) => {
    const allDone = COMPANIES.every(c => {
      const key = hcSessionKey(c.id, hcActiveDay, t);
      return hcSessions[key] && hcSessions[key].submitted;
    });
    return `
      <div class="hc-time-pill ${i===hcActiveTimeIdx?'active':''}" data-idx="${i}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICON_CLOCK}</svg>
        ${t}
        ${allDone ? `<span class="hc-tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${ICON_CHECK}</svg></span>` : ''}
      </div>`;
  }).join('');
  hcTimeRow.querySelectorAll('.hc-time-pill').forEach(el => {
    el.addEventListener('click', () => {
      hcActiveTimeIdx = Number(el.dataset.idx);
      renderHcTimeRow();
      renderCompanyScroll();
      renderHcContent();
    });
  });
}

function renderCompanyScroll(){
  const time = hcCurrentTime();
  const chips = [`
    <div class="company-chip ${hcActiveCompany==='all'?'active':''}" data-company="all">
      <span class="dot"></span>All
    </div>`];
  COMPANIES.forEach(c => {
    const key = time ? hcSessionKey(c.id, hcActiveDay, time) : null;
    const submitted = key && hcSessions[key] && hcSessions[key].submitted;
    chips.push(`
      <div class="company-chip ${hcActiveCompany===c.id?'active':''}" data-company="${c.id}">
        <span class="dot"></span>Company ${c.id}
        ${submitted ? `<span class="chip-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${ICON_CHECK}</svg></span>` : ''}
      </div>`);
  });
  companyScroll.innerHTML = chips.join('');
  companyScroll.querySelectorAll('.company-chip').forEach(el => {
    el.addEventListener('click', () => {
      const v = el.dataset.company;
      hcActiveCompany = v === 'all' ? 'all' : Number(v);
      renderCompanyScroll();
      renderHcContent();
    });
  });
}

function renderHcContent(){
  const time = hcCurrentTime();
  if(!time){
    hcContent.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>
        <p>There's no head count scheduled for this day.</p>
      </div>`;
    return;
  }
  if(hcActiveCompany === 'all'){
    renderHcDashboard(time);
  } else {
    renderHcCompany(hcActiveCompany, time);
  }
}

function renderHcDashboard(time){
  const day = DAYS.find(d => d.id === hcActiveDay);
  const cards = COMPANIES.map(c => {
    const key = hcSessionKey(c.id, hcActiveDay, time);
    const s = hcSessions[key];
    let statusHtml, cls;
    if(s && s.submitted){
      cls = 'done';
      statusHtml = `<span class="dc-tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${ICON_CHECK}</svg></span>Checked in`;
    } else if(s && s.confirmed.size > 0){
      cls = 'progress';
      statusHtml = `${s.confirmed.size} of ${s.total} confirmed`;
    } else {
      cls = 'pending';
      statusHtml = `Not started`;
    }
    return `
      <div class="hc-dash-card" data-company="${c.id}">
        <div class="dc-title">Company ${c.id}</div>
        <div class="dc-status ${cls}">${statusHtml}</div>
      </div>`;
  }).join('');

  hcContent.innerHTML = `
    <div class="hc-dash-summary">
      <h2>${day.title}</h2>
      <span>${time} head count &middot; all companies</span>
    </div>
    <div class="hc-dash-grid">${cards}</div>
  `;
  hcContent.querySelectorAll('.hc-dash-card').forEach(el => {
    el.addEventListener('click', () => {
      hcActiveCompany = Number(el.dataset.company);
      renderCompanyScroll();
      renderHcContent();
    });
  });
}

function renderHcCompany(companyId, time){
  const company = COMPANIES.find(c => c.id === companyId);
  const session = hcGetSession(companyId);

  const counselorTags = company.counselors.map(p => `
    <span class="counselor-tag">
      <span class="cav" style="background:${avatarColor(p.name,p.gender)}">${initialsOf(p.name)}</span>
      ${p.name}
    </span>`).join('');

  let bodyHtml;
  if(session.submitted){
    bodyHtml = `
      <div class="hc-complete">
        <div class="big-tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${ICON_CHECK}</svg></div>
        <h3>Head Count Complete</h3>
        <p>All ${session.total} youth in Company ${companyId} are confirmed present for the ${time} head count.</p>
        <button class="hc-reset-link" id="hc-reset">Start this head count over</button>
      </div>`;
  } else if(session.queue.length === 0){
    bodyHtml = `
      <div class="hc-complete">
        <div class="big-tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${ICON_CHECK}</svg></div>
        <h3>All ${session.total} confirmed!</h3>
        <p>Every youth in Company ${companyId} has been marked present. Submit the head count to lock it in.</p>
        <button class="hc-submit-btn" id="hc-submit">Submit Head Count</button>
      </div>`;
  } else {
    const nextId = session.queue[0];
    const behindId = session.queue[1];
    const next = company.youth.find(y => y.id === nextId);
    const behind = behindId ? company.youth.find(y => y.id === behindId) : null;
    const pct = Math.round((session.confirmed.size / session.total) * 100);

    bodyHtml = `
      <div class="hc-progress-row">
        <span class="hc-progress-label">${session.confirmed.size} of ${session.total} confirmed</span>
        <span class="hc-progress-sub">${session.queue.length} remaining</span>
      </div>
      <div class="hc-progress-track"><div class="hc-progress-fill" style="width:${pct}%"></div></div>

      <div class="swipe-stage" id="swipe-stage">
        ${behind ? `
        <div class="swipe-card behind">
          <div class="card-avatar" style="background:${avatarColor(behind.name,behind.gender)}">${behind.initials}</div>
          <p class="card-name">${behind.name}</p>
          <span class="card-gender">${behind.gender === 'M' ? 'Male' : 'Female'}</span>
        </div>` : ''}
        <div class="swipe-card top" id="swipe-card" data-id="${next.id}">
          <span class="card-stamp stamp-nope" id="stamp-nope">Not Here</span>
          <span class="card-stamp stamp-here" id="stamp-here">Here!</span>
          <div class="card-avatar" style="background:${avatarColor(next.name,next.gender)}">${next.initials}</div>
          <p class="card-name">${next.name}</p>
          <span class="card-gender">${next.gender === 'M' ? 'Male' : 'Female'}</span>
        </div>
      </div>

      <div class="swipe-actions">
        <button class="swipe-btn absent" id="btn-absent" aria-label="Not present">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${ICON_X}</svg>
        </button>
        <button class="swipe-btn present" id="btn-present" aria-label="Present">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${ICON_CHECK}</svg>
        </button>
      </div>
      <p class="swipe-hint">Swipe left if not present &middot; swipe right if present</p>
    `;
  }

  hcContent.innerHTML = `
    <div class="counselor-block">
      <h3>Counselors &middot; Company ${companyId}</h3>
      <div class="counselor-list">${counselorTags}</div>
    </div>
    ${bodyHtml}
  `;

  const resetBtn = document.getElementById('hc-reset');
  if(resetBtn){
    resetBtn.addEventListener('click', () => {
      delete hcSessions[hcSessionKey(companyId, hcActiveDay, time)];
      renderCompanyScroll();
      renderHcContent();
    });
  }

  const submitBtn = document.getElementById('hc-submit');
  if(submitBtn){
    submitBtn.addEventListener('click', () => {
      session.submitted = true;
      renderHcTimeRow();
      renderCompanyScroll();
      renderHcContent();
    });
  }

  const card = document.getElementById('swipe-card');
  if(card){
    wireSwipeCard(card, companyId, time);
    document.getElementById('btn-absent').addEventListener('click', () => resolveSwipe(card, companyId, time, 'left'));
    document.getElementById('btn-present').addEventListener('click', () => resolveSwipe(card, companyId, time, 'right'));
  }
}

function resolveSwipe(card, companyId, time, direction){
  const session = hcGetSession(companyId);
  const id = session.queue.shift();
  if(direction === 'right'){
    session.confirmed.add(id);
  } else {
    session.queue.push(id);
  }
  card.style.transition = '';
  card.classList.add(direction === 'right' ? 'flying-right' : 'flying-left');
  setTimeout(() => {
    renderCompanyScroll();
    renderHcContent();
  }, 220);
}

function wireSwipeCard(card, companyId, time){
  const stampHere = document.getElementById('stamp-here');
  const stampNope = document.getElementById('stamp-nope');
  const THRESHOLD = 90;
  let dragging = false;
  let startX = 0, startY = 0, dx = 0, dy = 0;

  function onDown(e){
    dragging = true;
    card.classList.remove('snap-back');
    card.style.transition = 'none';
    const p = e.touches ? e.touches[0] : e;
    startX = p.clientX; startY = p.clientY;
    card.setPointerCapture && e.pointerId != null && card.setPointerCapture(e.pointerId);
  }
  function onMove(e){
    if(!dragging) return;
    const p = e.touches ? e.touches[0] : e;
    dx = p.clientX - startX;
    dy = p.clientY - startY;
    const rot = dx / 14;
    card.style.transform = `translate(${dx}px, ${dy*0.4}px) rotate(${rot}deg)`;
    const pull = Math.min(Math.abs(dx) / THRESHOLD, 1);
    if(dx > 0){ stampHere.style.opacity = pull; stampNope.style.opacity = 0; }
    else { stampNope.style.opacity = pull; stampHere.style.opacity = 0; }
  }
  function onUp(){
    if(!dragging) return;
    dragging = false;
    if(dx > THRESHOLD){
      resolveSwipe(card, companyId, time, 'right');
    } else if(dx < -THRESHOLD){
      resolveSwipe(card, companyId, time, 'left');
    } else {
      card.style.transition = '';
      card.classList.add('snap-back');
      card.style.transform = 'translate(0,0) rotate(0deg)';
      stampHere.style.opacity = 0;
      stampNope.style.opacity = 0;
    }
    dx = 0; dy = 0;
  }

  card.addEventListener('pointerdown', onDown);
  card.addEventListener('pointermove', onMove);
  card.addEventListener('pointerup', onUp);
  card.addEventListener('pointercancel', onUp);
  card.addEventListener('pointerleave', () => { if(dragging) onUp(); });
}

/* ================= BOTTOM NAV ================= */
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-'+btn.dataset.screen).classList.add('active');
  });
});

renderDayPills();
renderFilters();
renderRoleFilters();
renderTimeline();

renderHcDayPills();
renderHcTimeRow();
renderCompanyScroll();
renderHcContent();
</script>
